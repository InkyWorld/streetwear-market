services:
  postgres:
    image: postgres:16-alpine
    container_name: streetwear-postgres
    environment:
      POSTGRES_DB: streetwear_market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d streetwear_market"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    container_name: streetwear-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/streetwear_market
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: "True"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pg_data:
