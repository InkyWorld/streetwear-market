services:
  postgres:
    image: postgres:16-alpine
    container_name: streetwear-postgres
    environment:
      POSTGRES_DB: streetwear_market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d streetwear_market"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pg_data:
